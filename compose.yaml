# One command: docker compose up --build
# Stack: Postgres 18 + Cost agent :8001 + Orchestrator :8000 + Next.js dev :3000
services:
  postgres:
    image: postgres:18
    container_name: agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    # Host 5435 avoids clashing with local Postgres on 5432 and common alternate ports (e.g. 5433).
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s
    # Postgres 18+ image expects the named volume on /var/lib/postgresql (not .../data).
    volumes:
      - agent_pg_data:/var/lib/postgresql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/schema_chat_memory.sql:/docker-entrypoint-initdb.d/02-chat-memory.sql:ro
      - ./database/schema_chat_memory_migration_002.sql:/docker-entrypoint-initdb.d/03-chat-memory-migration-002.sql:ro

  orchestrator:
    build:
      context: ./agents/orchestrator
    ports:
      - "8000:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      ORCHESTRATOR_AUTH_DISABLED: "1"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    image: node:20-bookworm-slim
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_ORCHESTRATOR_URL: http://localhost:8000
      NEXT_PUBLIC_USE_CHAT_PROXY: "1"
      ORCHESTRATOR_SERVER_URL: http://orchestrator:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0 --port 3000"
    depends_on:
      orchestrator:
        condition: service_healthy

volumes:
  agent_pg_data:
  frontend_node_modules:
