# ngrok — TCP tunnel to local PostgreSQL (v3 agent config).
# Install: https://ngrok.com/download
# Auth: ngrok config add-authtoken <token>
#
# Usage: ngrok start --config ngrok-tcp.example.yml postgres
#
# After start, ngrok prints a host like 0.tcp.ngrok.io:12345 — use that in DATABASE_URL:
#   postgresql://USER:PASS@0.tcp.ngrok.io:12345/postgres
#
# Security: use strong DB passwords, restrict ngrok IP allowlists if your plan supports it,
# and rotate tunnel endpoints when they change.
#
version: "3"
agent:
  authtoken: <YOUR_NGROK_AUTHTOKEN>
tunnels:
  postgres:
    proto: tcp
    addr: 5432
