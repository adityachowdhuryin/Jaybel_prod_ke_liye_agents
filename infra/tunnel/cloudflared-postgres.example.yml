# Cloudflare Tunnel — expose on-prem PostgreSQL to the internet for Cloud Run (TCP).
#
# 1. Install cloudflared: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/downloads/
# 2. Authenticate: cloudflared tunnel login
# 3. Create tunnel: cloudflared tunnel create hybrid-mesh-db
# 4. Copy the generated tunnel UUID into credentials-file below (or use tunnel name with newer CLI).
# 5. Replace <YOUR_TUNNEL_ID> and path to credentials JSON.
# 6. Route in Cloudflare Zero Trust dashboard: Public hostname OR private network as needed.
# 7. DATABASE_URL for Cloud Run uses the tunnel hostname:port Cloudflare assigns for TCP.
#
# Docs: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/use-cases/ssh/ssh-server/
#       (same pattern for raw TCP to Postgres)
#
tunnel: <YOUR_TUNNEL_ID>
credentials-file: /path/to/<YOUR_TUNNEL_ID>.json

ingress:
  - hostname: db-tunnel.example.com
    service: tcp://localhost:5432
  - service: http_status:404
