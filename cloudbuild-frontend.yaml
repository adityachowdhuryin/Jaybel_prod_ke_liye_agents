# Invoked from deploy.sh: build Next.js image with orchestrator URL baked in.
substitutions:
  _FRONTEND_IMAGE: "unset"
  _ORCH_URL: "https://example.invalid"

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_FRONTEND_IMAGE}"
      - "--build-arg"
      - "NEXT_PUBLIC_ORCHESTRATOR_URL=${_ORCH_URL}"
      - "-f"
      - "frontend/Dockerfile"
      - "frontend"

images:
  - "${_FRONTEND_IMAGE}"
